<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صفحة خاصة لك</title>
    <style>
        body { background-color: #ffebee; text-align: center; font-family: Arial; padding-top: 50px; }
        img { width: 250px; border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        h1 { color: #d32f2f; margin-top: 20px; }
        p { font-size: 20px; color: #5d4037; }
        .heart { font-size: 50px; animation: beat 1s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        audio { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="heart">❤️</div>
    <h1>أنتِ كل شيء في حياتي</h1>
    <img src="love.jpg">
    <p>بنيت لكِ هذا الموقع لأقول لكِ أنني أحبكِ جداً ❤️</p>
    
    <audio controls autoplay loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>
</body>
</html>
